# ══════════════════════════════════════════════════════════════════
# HospedaBR Frontend — CI/CD Pipeline
# ══════════════════════════════════════════════════════════════════
#
# FLUXO:
#   PR para master  → CI (lint + build)     → ✅ PR aprovável
#   Merge em master → CI + CD (deploy VPS)  → 🚀 Deploy automático
#   Manual          → workflow_dispatch      → 🔧 Deploy manual
#
# SETUP — GitHub → Settings → Secrets → Actions:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY
#
# ══════════════════════════════════════════════════════════════════

name: 🚀 Frontend CI/CD

on:
  pull_request:
    branches: [master, main]
    types: [opened, synchronize, reopened]

  push:
    branches: [master, main]

  workflow_dispatch:

env:
  NODE_VERSION: '22'
  DEPLOY_PATH: /opt/hospedagem-portal

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════
  # JOB 1: Lint & Build (CI)
  # ═══════════════════════════════════════════
  build:
    name: 🔨 Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_ENV: production

      - name: Build summary
        if: always()
        run: |
          echo "## 🔨 Frontend Build" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════
  # JOB 2: Deploy to VPS (CD)
  # ═══════════════════════════════════════════
  deploy:
    name: 🚀 Deploy Frontend
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync frontend to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.env.local' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Build & Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DEPLOYSSH'
          set -e
          cd /opt/hospedabr

          echo "══════════════════════════════════════════"
          echo "  🔨 Rebuilding frontend..."
          echo "══════════════════════════════════════════"

          # Rebuild only frontend service
          docker compose -f docker-compose.apps.yml -f docker-compose.prod.yml build frontend

          echo "══════════════════════════════════════════"
          echo "  🚀 Deploying frontend..."
          echo "══════════════════════════════════════════"

          docker compose -f docker-compose.apps.yml -f docker-compose.prod.yml up -d frontend

          echo "⏳ Waiting..."
          sleep 5

          echo "══════════════════════════════════════════"
          echo "  🧪 Health Check"
          echo "══════════════════════════════════════════"

          FE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost/ 2>&1 || echo "000")
          API=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost/api/properties?page=1 2>&1 || echo "000")

          echo "  Frontend: $FE"
          echo "  API proxy: $API"

          if [ "$FE" = "200" ]; then
            echo "  ✅ Frontend deployed successfully!"
          else
            echo "  ⚠️  Frontend may still be starting..."
          fi

          docker image prune -f > /dev/null 2>&1
          DEPLOYSSH

      - name: Deploy summary
        if: always()
        run: |
          echo "## 🚀 Frontend Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | http://${{ secrets.VPS_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
